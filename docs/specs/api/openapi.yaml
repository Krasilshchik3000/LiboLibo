openapi: 3.1.0
info:
  title: Либо-Либо API
  version: 0.1.0
  description: |
    API бэкенда «Либо-Либо», фаза 2.0.
    Источник правды по контенту — Transistor.fm; этот API нормализует, кэширует и контролирует доступ.
servers:
  - url: https://libolibo-production.up.railway.app/v1
    description: Railway (временный поддомен)
  - url: http://localhost:3000/v1
    description: Локальный Docker Compose

paths:
  /health:
    get:
      summary: Проверка работоспособности
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  db: { type: boolean }

  /devices:
    post:
      summary: Регистрация нового устройства
      description: iOS вызывает при первом запуске, сохраняет id в Keychain.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                apns_token:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"

  /devices/{id}:
    patch:
      summary: Обновить APNs-токен или зафиксировать активность
      parameters:
        - $ref: "#/components/parameters/DeviceId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                apns_token: { type: string, nullable: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "404":
          $ref: "#/components/responses/NotFound"

  /podcasts:
    get:
      summary: Список всех подкастов студии
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Podcast" }

  /podcasts/{id}:
    get:
      summary: Детали подкаста
      parameters:
        - $ref: "#/components/parameters/PodcastId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Podcast" }
        "404":
          $ref: "#/components/responses/NotFound"

  /podcasts/{id}/episodes:
    get:
      summary: Эпизоды одного подкаста (пагинация по pubDate desc)
      parameters:
        - $ref: "#/components/parameters/PodcastId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/AdaptyProfileId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EpisodePage" }
        "404":
          $ref: "#/components/responses/NotFound"

  /feed:
    get:
      summary: Глобальная лента эпизодов всех подкастов
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/AdaptyProfileId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EpisodePage" }

  /episodes/{id}:
    get:
      summary: Детали эпизода
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/AdaptyProfileId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Episode" }
        "404":
          $ref: "#/components/responses/NotFound"

  /me/entitlement:
    get:
      summary: Текущее состояние премиум-подписки (без обращения к Adapty)
      description: |
        Читает кэш из таблицы `entitlements` по `X-Adapty-Profile-Id`. Без
        заголовка или при отсутствии записи возвращает `is_premium: false`.
        Используется iOS для дебага и быстрой проверки локального состояния.
      parameters:
        - $ref: "#/components/parameters/AdaptyProfileId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EntitlementSnapshot" }

  /me/entitlement/refresh:
    post:
      summary: Обновить кэш entitlement из Adapty Server API
      description: |
        iOS зовёт после `Adapty.makePurchase` или `Adapty.restorePurchases`.
        Бэк ходит в Adapty с серверным секретом, читает access level (имя
        задаётся `ADAPTY_PREMIUM_ACCESS_LEVEL`, default `premium`) и
        апсертит запись в `entitlements`. После этого все последующие
        запросы `/v1/feed`, `/v1/podcasts/:id/episodes`, `/v1/episodes/:id`
        с тем же `X-Adapty-Profile-Id` начнут отдавать `audio_url` для
        премиум-эпизодов.

        Rate limit: не чаще 1 раза в 5 секунд на `profile_id`.
      parameters:
        - $ref: "#/components/parameters/AdaptyProfileId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EntitlementRefreshResult" }
        "400":
          description: Заголовок `X-Adapty-Profile-Id` отсутствует или невалиден
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429":
          description: Слишком частые refresh-запросы для этого `profile_id`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          description: На сервере не настроен `ADAPTY_SECRET_KEY`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /episodes/{episodeId}/comments:
    get:
      summary: Список голос-комментариев к эпизоду
      description: |
        Читать могут все, в том числе free-юзеры. Сортировка ASC по
        `timecode_sec`, при равенстве — ASC по `created_at`. Без пагинации
        на v1; берётся не более 1000 строк.
      parameters:
        - name: episodeId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommentList" }
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      summary: Опубликовать голос-комментарий (premium-only)
      description: |
        Премиум-пользователь оставляет голосовую заметку: m4a-файл (≤2 МБ,
        ≤60 с), её распознанный на iOS текст и тайм-код в эпизоде. На бэке
        лениво создаётся запись `users` с птица-именем (детерминированно
        по `adapty_profile_id`). Файл сохраняется на Volume mount, в
        ответ — DTO с `audio_url` для стриминга.

        Rate limit: 10 POST в минуту на `adapty_profile_id`.
      parameters:
        - name: episodeId
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/AdaptyProfileId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [audio, transcript, duration_sec, timecode_sec]
              properties:
                audio:
                  type: string
                  format: binary
                  description: m4a/AAC файл, ≤2 МБ.
                transcript:
                  type: string
                  description: Расшифровка от SFSpeechRecognizer на iOS, ≤4000 символов. Может быть пустой строкой, если распознавание не удалось.
                duration_sec:
                  type: integer
                  minimum: 1
                  maximum: 60
                timecode_sec:
                  type: integer
                  minimum: 0
      responses:
        "201":
          description: Создано
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }
        "400":
          description: Валидация не прошла (`invalid_audio`, `invalid_duration`, `invalid_timecode`, `transcript_too_long`, `missing_audio`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "402":
          description: Премиум требуется. Тело — `{error: "premium_required"}`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: Файл больше 2 МБ.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429":
          description: Превышен лимит 10 POST в минуту.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /comments/{id}:
    delete:
      summary: Удалить свой комментарий
      description: |
        Удалить может только автор: `X-Adapty-Profile-Id` должен совпадать
        с `author_adapty_profile_id`. Файл с диска чистится best-effort.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/AdaptyProfileId"
      responses:
        "204":
          description: Удалено.
        "401":
          description: Заголовок `X-Adapty-Profile-Id` отсутствует.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Не автор комментария.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          $ref: "#/components/responses/NotFound"

  /comments/{id}/audio:
    get:
      summary: Стрим аудиофайла комментария
      description: |
        Без авторизации. `Cache-Control: public, max-age=31536000, immutable`
        — id уникален, файл по нему никогда не меняется.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            audio/mp4:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    DeviceId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    PodcastId:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    Cursor:
      name: cursor
      in: query
      required: false
      schema: { type: string }
      description: Непрозрачный курсор из предыдущего ответа (`next_cursor`).
    AdaptyProfileId:
      name: X-Adapty-Profile-Id
      in: header
      required: false
      schema: { type: string, format: uuid }
      description: |
        Идентификатор профиля Adapty (UUID). При наличии бэкенд читает
        кэш entitlement и для премиум-эпизодов возвращает `audio_url` вместо
        `null`. Без заголовка зритель считается анонимным.

  responses:
    NotFound:
      description: Не найдено
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Device:
      type: object
      required: [id, created_at]
      properties:
        id: { type: string, format: uuid }
        apns_token: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }

    Podcast:
      type: object
      required: [id, name, artist, feed_url, genres, has_premium]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        artist:
          type: string
          description: |
            Имя автора/студии (`<itunes:author>` из RSS). Бэкенд гарантирует
            непустую строку — если в фиде поле отсутствует, подставляется `""`.
        feed_url: { type: string, format: uri }
        artwork_url: { type: string, format: uri, nullable: true }
        description: { type: string, nullable: true }
        genres:
          type: array
          items: { type: string }
        has_premium: { type: boolean }
        last_episode_date:
          type: string
          format: date-time
          nullable: true
          description: |
            Дата самого свежего выпуска (ISO-8601). Денормализованное поле,
            пересчитывается воркером при апсерте эпизодов. Клиент использует
            для деления подкастов на «выходят сейчас / недавно / давно не выходят».

    Episode:
      type: object
      required: [id, podcast_id, podcast_name, title, summary, pub_date, audio_url, is_premium]
      properties:
        id: { type: string }
        podcast_id: { type: integer, format: int64 }
        podcast_name: { type: string }
        podcast_artwork_url: { type: string, format: uri, nullable: true }
        title: { type: string }
        summary:
          type: string
          description: |
            Текстовое описание выпуска (`<description>` или `<itunes:summary>`).
            Бэкенд гарантирует строку — если в RSS пусто, подставляется `""`.
        pub_date: { type: string, format: date-time }
        duration_sec: { type: integer, nullable: true }
        audio_url:
          type: string
          format: uri
          nullable: true
          description: |
            Для публичных эпизодов — всегда заполнен.
            Для премиум-эпизодов — `null`, пока у устройства нет активного
            entitlement (entitlements появятся на фазе 2.3 вместе с Apple IAP).
            Метаданные (`title`, `summary`, `pub_date`, `duration_sec`,
            `podcast_artwork_url`) приходят всегда — это тизер для бесплатных
            пользователей.
        is_premium: { type: boolean }

    EpisodePage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Episode" }
        next_cursor:
          type: string
          nullable: true
          description: Передать в следующий запрос как `cursor`. `null` — конец.

    EntitlementSnapshot:
      type: object
      required: [is_premium]
      properties:
        is_premium: { type: boolean }
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Истечение премиума по данным локального кэша. `null` —
            lifetime-подписка или нет записи в кэше.

    EntitlementRefreshResult:
      type: object
      required: [is_premium, checked_at]
      properties:
        is_premium: { type: boolean }
        expires_at:
          type: string
          format: date-time
          nullable: true
        checked_at:
          type: string
          format: date-time
          description: Когда сервер последний раз ходил в Adapty.

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
        message: { type: string }

    CommentAuthor:
      type: object
      required: [bird_name]
      properties:
        bird_name:
          type: string
          description: Имя автора — название птицы, выдаётся детерминированно по `adapty_profile_id`. На коллизию — суффикс `-2`/`-3`/...

    Comment:
      type: object
      required:
        [
          id,
          author,
          transcript,
          timecode_sec,
          duration_sec,
          audio_url,
          created_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        author: { $ref: "#/components/schemas/CommentAuthor" }
        transcript:
          type: string
          description: Расшифровка от SFSpeechRecognizer на iOS. Может быть пустой строкой.
        timecode_sec:
          type: integer
          minimum: 0
          description: Момент в эпизоде, на котором был тап mic-кнопки.
        duration_sec:
          type: integer
          description: Длительность голосового комментария.
        audio_url:
          type: string
          format: uri
          description: Полный URL к стрим-эндпоинту аудиофайла.
        created_at:
          type: string
          format: date-time

    CommentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Comment" }
